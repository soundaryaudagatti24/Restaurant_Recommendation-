<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine - Aura Gastronomica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0A; color: #FFFFFF; }
        .accent-font { font-family: 'Syncopate', sans-serif; }
        .input-box {
            background: transparent;
            border-bottom: 2px solid #333;
            outline: none;
        }
        .input-box:focus { border-bottom-color: #fff; }
        #loader { display: none; }
        #loader.active { display: flex; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="loader" class="fixed inset-0 bg-black z-[100] items-center justify-center">
        <div class="text-center">
            <div class="w-24 h-[1px] bg-white/20 mx-auto relative overflow-hidden">
                <div class="absolute inset-0 bg-white w-1/2 animate-[shimmer_1.5s_infinite]"></div>
            </div>
            <p class="accent-font text-[10px] tracking-[0.5em] mt-6 animate-pulse">ANALYZING TEXTURES</p>
        </div>
    </div>

    <nav class="p-10 flex justify-between items-center">
        <a href="/" class="accent-font text-xl tracking-[0.5em]">AURA Gastronomica</a>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6">
        <div class="w-full max-w-2xl">
            <span class="text-xs uppercase tracking-[0.4em] text-gray-500 mb-4 block">Input Search Query</span>
            <form action="/result" method="POST" id="search-form">
                <input type="text" name="output" id="output" placeholder="ENTER RESTAURANT NAME..." 
                       class="input-box w-full py-8 text-3xl md:text-5xl accent-font uppercase tracking-tighter placeholder:text-white/10">
                
                <div id="suggestions" class="mt-4 border-l border-white/10 ml-2"></div>

                <button type="submit" class="mt-12 bg-white text-black px-12 py-5 accent-font text-[10px] tracking-[0.3em] hover:invert transition-all">
                    GENERATE PROFILE
                </button>
            </form>
        </div>
    </main>

    <script>
        const inputField = document.getElementById('output');
        const suggestionsBox = document.getElementById('suggestions');
        const form = document.getElementById('search-form');
        const loader = document.getElementById('loader');

        form.addEventListener('submit', () => loader.classList.add('active'));

        inputField.addEventListener('input', async function() {
            const val = this.value;
            if (val.length < 2) { suggestionsBox.innerHTML = ""; return; }
            const res = await fetch(`/autocomplete?term=${val}`);
            const data = await res.json();
            suggestionsBox.innerHTML = data.map(item => 
                `<div class="px-6 py-3 cursor-pointer hover:bg-white hover:text-black transition-all text-sm uppercase tracking-widest" 
                      onclick="document.getElementById('output').value='${item}'; document.getElementById('suggestions').innerHTML=''">
                    ${item}
                </div>`
            ).join('');
        });
    </script>
</body>
</html>
